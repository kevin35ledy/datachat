services:
  # ── Redis (task queue for Celery audit jobs) ─────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # ── Qdrant (vector store for schema RAG) ────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - qdrant_data:/qdrant/storage

  # ── DB-IA API (backend) ──────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./backend:/app
      - dbia_data:/app/.dbia_connections
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    profiles: ["full"]  # Only start with: docker-compose --profile full up

  # ── Celery worker (audit jobs) ───────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./backend:/app
      - dbia_data:/app/.dbia_connections
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["full"]

volumes:
  redis_data:
  qdrant_data:
  dbia_data:
